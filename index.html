<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a2332">
<meta name="description" content="Dhimesh Patel, CPA Director at Skyline Accounting — save my contact, book a call, email, or visit our website.">
<!-- Keeps this card out of search engines. Delete this line to allow indexing. -->
<meta name="robots" content="noindex">
<title>Dhimesh Patel · Skyline Accounting</title>
<style>
  :root {
    --navy: #1a2332;
    --accent: #2c6cdf;
    --accent-dark: #2257b8;
    --page-bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1a2332;
    --muted: #5a6472;
    --border: #e2e5ea;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--page-bg);
    color: var(--text);
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 32px;
  }

  main {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: 0 6px 28px rgba(26, 35, 50, 0.10);
    padding: 32px 24px 24px;
    text-align: center;
  }

  /* Header band behind the photo */
  .photo-wrap {
    width: 128px;
    height: 128px;
    margin: 0 auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #fff;
    box-shadow: 0 4px 16px rgba(26, 35, 50, 0.18);
    background: var(--navy);
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--navy);
  }
  .title {
    margin-top: 4px;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
  }
  .company {
    margin-top: 2px;
    font-size: 0.95rem;
    color: var(--muted);
  }

  .actions {
    margin-top: 26px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Buttons / links */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 54px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--navy);
    transition: transform 0.06s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .btn svg { flex: 0 0 auto; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(44, 108, 223, 0.32);
    font-size: 1.05rem;
    min-height: 58px;
  }
  .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-secondary:hover { background: #f7f8fa; }

  /* Tap / press animation */
  .btn:active { transform: scale(0.97); }

  /* Visible keyboard focus */
  .btn:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* Address block */
  .address {
    margin-top: 26px;
    padding-top: 22px;
    border-top: 1px solid var(--border);
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .address a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    min-height: 44px;
    padding: 6px 4px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }
  .address a:active { transform: scale(0.97); }

  footer {
    margin-top: 18px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #9aa2ae;
  }

</style>
</head>
<body>

<main>
  <div class="photo-wrap">
    <img
      src="photo.webp"
      alt="Dhimesh Patel, CPA Director at Skyline Accounting"
      width="128" height="128">
  </div>

  <h1>Dhimesh Patel</h1>
  <p class="title">CPA Director</p>
  <p class="company">Skyline Accounting</p>

  <div class="actions">
    <!-- Primary action: download the vCard. iOS Safari opens the Add to Contacts screen. -->
    <a class="btn btn-primary" href="dhimesh-patel.vcf" download="dhimesh-patel.vcf" type="text/vcard">

        <circle cx="9" cy="7" r="4"/>

      </svg>

    </a>

    <a class="btn btn-secondary" href="https://calendly.com/dhimesh-skylineaccounting/phone-consultation-with-dhimesh-15-mins" target="_blank" rel="noopener">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <rect x="3" y="4" width="18" height="18" rx="2"/>

    </a>

      </svg>
      Email
    </a>

    <a class="btn btn-secondary" href="https://skylineaccounting.com.au" target="_blank" rel="noopener">
      <svg width="19" height="19" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <circle cx="12" cy="12" r="10"/>
        <path d="M2 12h20"/>
        <path d="M12 2a15.3 15.3 0 0 1 4 10 15.3 15.3 0 0 1-4 10 15.3 15.3 0 0 1-4-10 15.3 15.3 0 0 1 4-10z"/>
      </svg>
      Visit Website

    <a class="btn btn-secondary" href="https://g.page/r/CWUTYfVUmmvlEAE/review" target="_blank" rel="noopener">

    <a href="https://www.google.com/maps/search/?api=1&query=6%2F165%20Broadwater%20Terrace%2C%20Redland%20Bay%20QLD%204165" id="directionsLink" target="_blank" rel="noopener">
      <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true">
        <path d="M21 10c0 7-9 13-9 13s-9-6-9-13a9 9 0 0 1 18 0z"/>
        <circle cx="12" cy="10" r="3"/>
      </svg>
      Get directions
    </a>
  </address>

  <footer>Tap to connect</footer>
</main>

<script>
  // Route the Get directions link to the user's likely default map app.
  // iPhone/iPad → Apple Maps. Android → geo: URI (shows the device's map-app chooser).
  // Anything else (desktop) falls through to the Google Maps href in the HTML.
  (function () {
    var link = document.getElementById('directionsLink');
    if (!link) return;
    var q = encodeURIComponent('6/165 Broadwater Terrace, Redland Bay QLD 4165');
    var ua = navigator.userAgent;
    if (/iPhone|iPad|iPod/.test(ua)) {
      link.href = 'https://maps.apple.com/?q=' + q;
    } else if (/Android/.test(ua)) {
      link.href = 'geo:0,0?q=' + q;
    }
  })();
</script>

</body>
</html>
