<!DOCTYPE html>
<html lang="en-AU">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<meta name="theme-color" content="#1a2332">
<meta name="description" content="Dhimesh Patel, CPA Director at Skyline Accounting — save my contact, call, email, or visit our website.">
<title>Dhimesh Patel · Skyline Accounting</title>
<style>
  :root {
    --navy: #1a2332;
    --accent: #2c6cdf;
    --accent-dark: #2257b8;
    --page-bg: #f4f5f7;
    --card-bg: #ffffff;
    --text: #1a2332;
    --muted: #5a6472;
    --border: #e2e5ea;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; }

  html, body {
    font-family: system-ui, -apple-system, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
    background: var(--page-bg);
    color: var(--text);
    -webkit-text-size-adjust: 100%;
    -webkit-font-smoothing: antialiased;
  }

  body {
    min-height: 100vh;
    display: flex;
    justify-content: center;
    padding: 24px 16px 32px;
  }

  main {
    width: 100%;
    max-width: 420px;
    background: var(--card-bg);
    border-radius: 20px;
    box-shadow: 0 6px 28px rgba(26, 35, 50, 0.10);
    padding: 32px 24px 24px;
    text-align: center;
  }

  /* Header band behind the photo */
  .photo-wrap {
    width: 128px;
    height: 128px;
    margin: 0 auto 18px;
    border-radius: 50%;
    overflow: hidden;
    border: 4px solid #fff;
    box-shadow: 0 4px 16px rgba(26, 35, 50, 0.18);
    background: var(--navy);
  }
  .photo-wrap img {
    width: 100%;
    height: 100%;
    object-fit: cover;
    display: block;
  }

  h1 {
    font-size: 1.55rem;
    font-weight: 700;
    letter-spacing: -0.01em;
    color: var(--navy);
  }
  .title {
    margin-top: 4px;
    font-size: 1rem;
    font-weight: 600;
    color: var(--accent);
  }
  .company {
    margin-top: 2px;
    font-size: 0.95rem;
    color: var(--muted);
  }

  .actions {
    margin-top: 26px;
    display: flex;
    flex-direction: column;
    gap: 12px;
  }

  /* Buttons / links */
  .btn {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    min-height: 54px;
    padding: 14px 18px;
    border-radius: 12px;
    font-size: 1rem;
    font-weight: 600;
    text-decoration: none;
    cursor: pointer;
    border: 1.5px solid var(--border);
    background: #fff;
    color: var(--navy);
    transition: transform 0.06s ease, box-shadow 0.15s ease, background 0.15s ease;
  }
  .btn svg { flex: 0 0 auto; }

  .btn-primary {
    background: var(--accent);
    border-color: var(--accent);
    color: #fff;
    box-shadow: 0 4px 14px rgba(44, 108, 223, 0.32);
    font-size: 1.05rem;
    min-height: 58px;
  }
  .btn-primary:hover { background: var(--accent-dark); border-color: var(--accent-dark); }
  .btn-secondary:hover { background: #f7f8fa; }

  /* Tap / press animation */
  .btn:active { transform: scale(0.97); }

  /* Visible keyboard focus */
  .btn:focus-visible {
    outline: 3px solid var(--accent);
    outline-offset: 2px;
  }

  /* Copy-number fallback */
  .copy-row {
    margin-top: 2px;
    min-height: 36px;
    display: flex;
    align-items: center;
    justify-content: center;
  }
  .copy-btn {
    background: none;
    border: none;
    color: var(--muted);
    font: inherit;
    font-size: 0.85rem;
    padding: 8px 12px;
    cursor: pointer;
    border-radius: 8px;
  }
  .copy-btn:active { transform: scale(0.97); }
  .copy-btn:focus-visible { outline: 2px solid var(--accent); outline-offset: 2px; }
  .copy-btn[hidden] { display: none; }

  /* Address block */
  .address {
    margin-top: 26px;
    padding-top: 22px;
    border-top: 1px solid var(--border);
    font-size: 0.92rem;
    color: var(--muted);
    line-height: 1.5;
  }
  .address a {
    display: inline-flex;
    align-items: center;
    gap: 6px;
    margin-top: 8px;
    min-height: 44px;
    padding: 6px 4px;
    color: var(--accent);
    font-weight: 600;
    text-decoration: none;
  }
  .address a:active { transform: scale(0.97); }

  footer {
    margin-top: 18px;
    font-size: 0.78rem;
    letter-spacing: 0.04em;
    text-transform: uppercase;
    color: #9aa2ae;
  }

  /* Toast confirmation */
  #toast {
    position: fixed;
    left: 50%;
    bottom: 28px;
    transform: translateX(-50%) translateY(20px);
    background: var(--navy);
    color: #fff;
    font-size: 0.9rem;
    font-weight: 600;
    padding: 11px 20px;
    border-radius: 999px;
    box-shadow: 0 6px 20px rgba(26, 35, 50, 0.3);
    opacity: 0;
    pointer-events: none;
    transition: opacity 0.2s ease, transform 0.2s ease;
  }
  #toast.show {
    opacity: 1;
    transform: translateX(-50%) translateY(0);
  }
</style>
</head>
<body>

<main>

</main>

<div id="toast" role="status" aria-live="polite"></div>

<script>
  (function () {
    var copyBtn = document.getElementById('copyNumber');
    var toast = document.getElementById('toast');
    var toastTimer;

    function showToast(msg) {
      toast.textContent = msg;
      toast.classList.add('show');
      clearTimeout(toastTimer);
      toastTimer = setTimeout(function () {
        toast.classList.remove('show');
      }, 2000);
    }

    // If the clipboard API is unavailable, hide the copy affordance entirely.
    if (!navigator.clipboard || !navigator.clipboard.writeText) {
      copyBtn.hidden = true;
      return;
    }

    copyBtn.addEventListener('click', function () {
      navigator.clipboard.writeText(copyBtn.dataset.number).then(function () {
        showToast('Number copied');
      }).catch(function () {
        showToast('Couldn’t copy — ' + copyBtn.dataset.number);
      });
    });
  })();
</script>

</body>
</html>
